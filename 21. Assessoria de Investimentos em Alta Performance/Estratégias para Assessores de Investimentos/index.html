<style>
:root{
  --bg:#0a0f1c; --surface:#11192c; --surface-hi:#172240; --border:#22304f;
  --gold:#cda05b; --gold-soft:#cda05b22; --text:#e9ecf3; --muted:#8d97ad;
  --font-display:'Source Serif 4',Georgia,serif;
  --font-body:'Inter',-apple-system,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}

*{box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);margin:0;}
.wrap{max-width:780px;margin:0 auto;padding:28px 20px 70px;}
.crumb{font-family:var(--font-mono);font-size:0.78rem;color:var(--muted);text-decoration:none;letter-spacing:0.03em;}
.crumb:hover{color:var(--gold);}
h1{font-family:var(--font-display);font-weight:600;font-size:1.5rem;margin:14px 0 4px;letter-spacing:0.01em;}
.subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:22px;font-family:var(--font-mono);}
.rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:18px;}
.list{display:flex;flex-direction:column;gap:8px;}
.row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px 16px;text-decoration:none;color:var(--text);transition:border-color .15s,background .15s;}
.row:hover{border-color:var(--gold);background:var(--surface-hi);}
.code{font-family:var(--font-mono);font-size:0.72rem;color:var(--gold);background:var(--gold-soft);border:1px solid #cda05b55;border-radius:5px;padding:3px 7px;flex-shrink:0;min-width:34px;text-align:center;}
.row .title{flex:1;font-size:0.96rem;}
.row .meta{font-family:var(--font-mono);font-size:0.74rem;color:var(--muted);flex-shrink:0;}
.empty{color:var(--muted);font-family:var(--font-mono);font-size:0.85rem;}
</style>
</head>
